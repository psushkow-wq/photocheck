{% extends "base.html" %}
{% block title %}Регистрация — PhotoAuth{% endblock %}
{% block head %}
<style>
.auth-wrap {
  min-height: calc(100vh - 60px);
  display: flex; align-items: center; justify-content: center;
  padding: 40px 16px;
}
.auth-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px; width: 100%; max-width: 420px;
}
.auth-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
.auth-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
.form-group { margin-bottom: 18px; }
.form-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block; color: var(--muted); }
.form-input {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); font-size: 15px; font-family: var(--font-display);
  transition: border 0.2s; outline: none;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--muted); }
.btn-submit {
  width: 100%; padding: 14px; border-radius: 10px;
  background: var(--accent); color: white; font-size: 15px;
  font-weight: 700; border: none; cursor: pointer;
  font-family: var(--font-display); transition: all 0.2s; margin-top: 8px;
}
.btn-submit:hover { background: var(--accent2); transform: translateY(-1px); }
.auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
.auth-footer a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Создать аккаунт</div>
    <div class="auth-sub">Бесплатно. Навсегда.</div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Ваше имя</label>
        <input class="form-input" type="text" name="name" placeholder="Иван Петров" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-input" type="password" name="password" placeholder="Минимум 6 символов" required>
      </div>
      <div class="form-group">
        <label class="form-label">Повторите пароль</label>
        <input class="form-input" type="password" name="confirm" placeholder="Повторите пароль" required>
      </div>
      <button class="btn-submit" type="submit">Зарегистрироваться →</button>
    </form>
    <div class="auth-footer">Уже есть аккаунт? <a href="/login">Войти</a></div>
  </div>
</div>
{% endblock %}
